name: build and release

on:
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform.os_name }} with rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bin: nativestart-linux-x86_64
            dependencies: "sudo apt update && sudo apt install -y libgtk-3-dev"
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: nativestart-windows-x86_64
            extension: .exe
          - os_name: macOS-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            bin: nativestart-mac-x86_64
          - os_name: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: nativestart-mac-aarch64
        toolchain:
          - stable
        feature:
          - name: signed
            description: with signature support
            cmd: --features check-signature
          - name: unsigned
            description: without signature support
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: ${{ matrix.platform.dependencies }}
        if: matrix.platform.dependencies != null
      - name: Build binary ${{ matrix.feature.description }}
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: "build"
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release --bin generic ${{ matrix.feature.cmd }}"
          strip: true
      - name: Rename binary
        run: mv target/${{ matrix.platform.target }}/release/generic${{ matrix.platform.extension }} target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}-${{ matrix.feature.name }}${{ matrix.platform.extension }}
      - name: Release binary to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}-${{ matrix.feature.name }}${{ matrix.platform.extension }}
